services:
  - type: web
    name: skoolnect-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: skoolnect-ui
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/streamlit_app.py --server.port 10000 --server.address 0.0.0.0

  - type: web
    name: skoolnect-admin
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run frontend/admin_dashboard.py --server.port 10000 --server.address 0.0.0.0